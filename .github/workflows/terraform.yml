name: Terraform CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: infrastructure/terraform
  AWS_REGION: us-east-1

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Bootstrap CI EKS admin access
        run: |
          set -euo pipefail

          CLUSTER_NAME="project-bedrock-cluster"
          CI_ROLE_ARN="${{ secrets.AWS_ROLE_ARN }}"
          ADMIN_POLICY_ARN="arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy"

          if ! aws eks describe-cluster \
            --name "$CLUSTER_NAME" \
            --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
            echo "EKS cluster does not exist yet; skipping access bootstrap."
            exit 0
          fi

          if ! aws eks describe-access-entry \
            --cluster-name "$CLUSTER_NAME" \
            --principal-arn "$CI_ROLE_ARN" \
            --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
            aws eks create-access-entry \
              --cluster-name "$CLUSTER_NAME" \
              --principal-arn "$CI_ROLE_ARN" \
              --type STANDARD \
              --region "${{ env.AWS_REGION }}"
          fi

          if [ "$(aws eks list-associated-access-policies \
            --cluster-name "$CLUSTER_NAME" \
            --principal-arn "$CI_ROLE_ARN" \
            --region "${{ env.AWS_REGION }}" \
            --query "contains(accessPolicies[].policyArn, '$ADMIN_POLICY_ARN')" \
            --output text)" != "True" ]; then
            aws eks associate-access-policy \
              --cluster-name "$CLUSTER_NAME" \
              --principal-arn "$CI_ROLE_ARN" \
              --policy-arn "$ADMIN_POLICY_ARN" \
              --access-scope type=cluster \
              --region "${{ env.AWS_REGION }}"
          fi

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name project-bedrock-cluster \
            --region ${{ env.AWS_REGION }}
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          KUBECONFIG: ${{ env.KUBECONFIG }}
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "plan_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... output truncated ...'
              : planOutput;
            const body = `## Terraform Plan Output
            <details>
            <summary>Click to expand</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Bootstrap CI EKS admin access
        run: |
          set -euo pipefail

          CLUSTER_NAME="project-bedrock-cluster"
          CI_ROLE_ARN="${{ secrets.AWS_ROLE_ARN }}"
          ADMIN_POLICY_ARN="arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy"

          if ! aws eks describe-cluster \
            --name "$CLUSTER_NAME" \
            --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
            echo "EKS cluster does not exist yet; skipping access bootstrap."
            exit 0
          fi

          if ! aws eks describe-access-entry \
            --cluster-name "$CLUSTER_NAME" \
            --principal-arn "$CI_ROLE_ARN" \
            --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
            aws eks create-access-entry \
              --cluster-name "$CLUSTER_NAME" \
              --principal-arn "$CI_ROLE_ARN" \
              --type STANDARD \
              --region "${{ env.AWS_REGION }}"
          fi

          if [ "$(aws eks list-associated-access-policies \
            --cluster-name "$CLUSTER_NAME" \
            --principal-arn "$CI_ROLE_ARN" \
            --region "${{ env.AWS_REGION }}" \
            --query "contains(accessPolicies[].policyArn, '$ADMIN_POLICY_ARN')" \
            --output text)" != "True" ]; then
            aws eks associate-access-policy \
              --cluster-name "$CLUSTER_NAME" \
              --principal-arn "$CI_ROLE_ARN" \
              --policy-arn "$ADMIN_POLICY_ARN" \
              --access-scope type=cluster \
              --region "${{ env.AWS_REGION }}"
          fi

      - name: Wait for EKS Cluster Readiness
        run: |
          echo "Waiting for EKS cluster to be ACTIVE..."
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            status=$(aws eks describe-cluster \
              --name project-bedrock-cluster \
              --region ${{ env.AWS_REGION }} \
              --query 'cluster.status' \
              --output text 2>/dev/null || echo "NOT_FOUND")
            echo "Cluster status: $status"
            if [ "$status" = "ACTIVE" ]; then
              echo "EKS cluster is ACTIVE"
              break
            fi
            attempt=$((attempt+1))
            if [ $attempt -lt $max_attempts ]; then
              sleep 10
            fi
          done
          if [ $attempt -eq $max_attempts ]; then
            echo "ERROR: Cluster did not reach ACTIVE state within timeout"
            exit 1
          fi

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name project-bedrock-cluster \
            --region ${{ env.AWS_REGION }}
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Validate kubectl Access
        run: |
          echo "Validating kubectl access to cluster..."
          kubectl cluster-info || true
          kubectl get nodes || true
          echo "kubectl configuration complete"
          
          echo "Verifying AWS credentials..."
          aws sts get-caller-identity

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          KUBECONFIG: ${{ env.KUBECONFIG }}
        run: terraform destroy -auto-approve
